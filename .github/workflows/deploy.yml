name: Deploy Static Portfolio to GitHub Pages

on:
  push:
    branches:
      - master # Set to your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Use a Node.js version compatible with Next.js 14

      - name: Install dependencies
        run: npm install

      - name: Build Next.js project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages

# Note on basePath:
# The current next.config.js has basePath: "/portfolio" and assetPrefix: "/portfolio/".
# If you are deploying this project to a User Page (e.g., abhijeetmohanan.github.io)
# and want it to serve from the root of that domain, you MUST change
# basePath and assetPrefix to "/" in next.config.js.
# If this is for a project page (e.g., username.github.io/repo-name),
# then basePath should match your repository name (e.g., "/repo-name").
