baseURL: "https://abhijeetmohanan.github.io/"
title: "Abhijeet Mohanan | Infrastructure Engineer"
theme: papermod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production 
  title: "Abhijeet Mohanan"
  description: "Personal Portfolio and Blog of an Infrastructure Engineer specializing in Kubernetes, AWS, Networking, and Containers."
  keywords: [Infrastructure Engineer, Kubernetes, AWS, Networking, Containers, Platform Engineering, DevOps]
  author: Abhijeet Mohanan
  
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  label:
    text: "Abhijeet Mohanan"
    icon: /terminal.svg
    iconHeight: 35

  # home-info mode
  profileMode:
    enabled: true
    title: "Hi, I'm Abhijeet 👋"
    subtitle: "Infrastructure & Platform Engineer\n\nI build scalable, secure, and resilient infrastructure. Expert in Kubernetes, AWS, complex Networking, and Container Orchestration."
    buttons:
      - name: About Me
        url: /about
      - name: Projects & Tech
        url: /tech
      - name: Blog
        url: /posts

  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/abhijeetmohanan"
    - name: github
      url: "https://github.com/abhijeetmohanan"
    - name: email
      url: "mailto:your.email@example.com"

menu:
  main:
    - identifier: about
      name: About Me
      url: /about/
      weight: 10
    - identifier: tech
      name: Tech & Projects
      url: /tech/
      weight: 20
    - identifier: posts
      name: Blog
      url: /posts/
      weight: 30 
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false