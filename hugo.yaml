baseURL: "https://abhijeetmohanan.github.io/"
languageCode: "en-us"
title: "Abhijeet Mohanan - DevOps Engineer"
theme: hugo-profile

defaultContentLanguage: "en"

params:
  title: "Abhijeet Mohanan"
  description: "Portfolio of Abhijeet Mohanan, a DevOps Engineer."
  favicon: "/terminal.svg"

  customScripts: |
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        anime({
          targets: '.content h1',
          translateY: [-50, 0],
          opacity: [0, 1],
          duration: 1500,
          easing: 'easeOutExpo',
          delay: 500
        });
        anime({
          targets: '.content h2',
          translateX: [-50, 0],
          opacity: [0, 1],
          duration: 1500,
          easing: 'easeOutExpo',
          delay: 700
        });
        anime({
          targets: '.hero-content',
          translateY: [20, 0],
          opacity: [0, 1],
          duration: 1500,
          easing: 'easeOutExpo',
          delay: 900
        });
        anime({
          targets: '.img-thumbnail',
          scale: [0.8, 1],
          opacity: [0, 1],
          duration: 2000,
          easing: 'easeOutElastic(1, .8)',
          delay: 200
        });
      });
    </script>
  theme:
    defaultTheme: "dark"

  color:
    textColor: "#2C3333"
    secondaryTextColor: "#F5F5F5"
    backgroundColor: "#54BAB9"
    primaryColor: "#F0F0F0"
    secondaryColor: "#78C2C3"
    darkmode:
      textColor: "#F5F5F5"
      secondaryTextColor: "#F5F5F5"
      backgroundColor: "#313552"
      primaryColor: "#F1E0AC"
      secondaryColor: "#30475E"

  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Abhijeet Mohanan."
    subtitle: "I build robust cloud-native infrastructure."
    content: "A dedicated DevOps Engineer with expertise in Kubernetes, AWS, and autoscaling. I specialize in turning complex infrastructure challenges into highly reliable, automated platforms."
    button:
      enable: true
      name: "Contact Me"
      url: "mailto:abhijeetmohanan@gmail.com"
      download: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/abhijeetmohanan
        - icon: fab fa-linkedin
          url: https://linkedin.com/in/abhijeetmohanan
        - icon: fas fa-envelope
          url: mailto:abhijeetmohanan@gmail.com

  about:
    enable: true
    title: "About Me"
    content: |
      I am a dedicated **DevOps Engineer** with over four years of experience in building and operating cloud-native platforms. My expertise lies in Kubernetes, autoscaling, and Infrastructure as Code, alongside a commitment to optimizing costs and ensuring reliability. I have successfully enabled developer self-service platforms and enhanced observability across applications.
    skills:
      enable: true
      title: "Core Technologies & Skills:"
      items:
        - Kubernetes
        - AWS (EKS, EC2, RDS, Lambda)
        - Terraform & CloudFormation
        - GitOps (ArgoCD, GitLab)
        - Observability (Prometheus, Grafana, Loki)
        - Karpenter & KEDA

  experience:
    enable: true
    title: "Experience"
    items:
      - company: "Skit.ai"
        companyUrl: "https://skit.ai"
        jobs:
          - name: "DevOps Engineer"
            date: "Jan 2022 - Present"
            content: |
              - Built Kubernetes platforms for application & ML workloads.
              - Implemented Karpenter and KEDA, optimizing workloads and reducing infra costs by 30%.
              - Led incident response (JIRA, OpsGenie), reducing MTTR by 40%.
              - Delivered CI/CD pipelines integrated with GitOps (ArgoCD + GitLab).
              - Rolled out observability stack (Prometheus, Grafana, Loki) and automated DORA metrics.
              - Improved pre-production uptime from 50% to 95%.
          - name: "DevOps Support Engineer"
            date: "Aug 2021 - Jan 2022"
            content: |
              - Migrated workloads from bare-metal to AWS EKS using Terraform.
              - Automated infra rollouts, reducing delivery time by 70%.
              - Reduced infra costs by consolidating ALBs and optimizing cloud usage.
      - company: "Vernacular.ai | Skit.ai"
        jobs:
          - name: "DevOps Intern"
            date: "Apr 2021 - Jul 2021"
            content: |
              - Assisted with Kubernetes upgrades and syslog + Promtail logging integration.
              - Evaluated monitoring solutions (Zabbix vs Prometheus).

  education:
    enable: true
    title: "Education & Certifications"
    items:
      - title: "B.Tech in Electronics & Telecommunication"
        institution: "MGM’s JNEC, Aurangabad"
        date: "Aug 2017 - May 2021"
      - title: "Certified Kubernetes Administrator (CKA)"
        institution: "Cloud Native Computing Foundation"
      - title: "Red Hat Certified Engineer (RHCE)"
        institution: "Red Hat"
      - title: "Specialist in OpenShift Administration"
        institution: "Red Hat"